<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClipCloud</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0a0c;color:#d0d0d4;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #1e1e22;flex-shrink:0;background:#0e0e11}
.logo{font-size:1.1rem;font-weight:700;letter-spacing:-.02em;white-space:nowrap}
.logo span{color:#6c8aff}
.spacer{flex:1}
.status-pill{font-size:.72rem;padding:3px 10px;border-radius:99px;font-weight:600}
.pill-locked{background:#ef444422;color:#f87171}
.pill-unlocked{background:#22c55e22;color:#4ade80}
.pill-loading{background:#eab30822;color:#facc15}
button{padding:7px 16px;border-radius:7px;border:none;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap}
button:active{transform:scale(.96)}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-accent{background:#6c8aff;color:#fff}
.btn-accent:hover:not(:disabled){background:#5a78f0}
.btn-ghost{background:transparent;color:#888;border:1px solid #2a2a2e}
.btn-ghost:hover:not(:disabled){border-color:#6c8aff;color:#6c8aff}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover:not(:disabled){background:#dc2626}
.icon-btn{padding:7px 10px;font-size:1rem;line-height:1}
.editor-wrap{flex:1;position:relative;overflow:hidden}
#editor{width:100%;height:100%;padding:20px 24px;border:none;background:transparent;color:#d0d0d4;font-family:"SF Mono","Fira Code","Cascadia Code",monospace;font-size:.92rem;line-height:1.7;resize:none;outline:none;tab-size:2}
#editor::placeholder{color:#3a3a40}
#editor:disabled{color:#3a3a40;cursor:not-allowed}
.bottombar{display:flex;align-items:center;gap:12px;padding:6px 16px;border-top:1px solid #1e1e22;font-size:.72rem;color:#555;flex-shrink:0;background:#0e0e11}
.bottombar .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-ok{background:#22c55e}
.dot-err{background:#ef4444}
.dot-warn{background:#eab308}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:auto}
.modal{background:#16161a;border:1px solid #2a2a2e;border-radius:12px;padding:24px;width:340px;max-width:90vw;display:flex;flex-direction:column;gap:14px}
.modal h3{font-size:.95rem;font-weight:600}
.modal input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #2a2a2e;background:#0e0e11;color:#d0d0d4;font-size:.9rem;outline:none}
.modal input:focus{border-color:#6c8aff}
.modal .btn-row{display:flex;gap:8px;justify-content:flex-end}
.modal .err-msg{font-size:.75rem;color:#f87171;min-height:1em}
.toast{position:fixed;bottom:48px;left:50%;transform:translateX(-50%) translateY(20px);background:#222;color:#eee;padding:8px 18px;border-radius:8px;font-size:.8rem;opacity:0;transition:all .25s;pointer-events:none;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><span>Clip</span>Cloud</div>
  <div class="spacer"></div>
  <span id="statePill" class="status-pill pill-loading">加载中</span>
  <button id="btnLock" class="btn-ghost icon-btn" title="锁定" disabled>🔒</button>
  <button id="btnClear" class="btn-ghost icon-btn" title="清除所有本地数据" style="font-size:.75rem">🗑️</button>
</div>
<div class="editor-wrap">
  <textarea id="editor" disabled placeholder="正在加载…"></textarea>
</div>
<div class="bottombar">
  <div id="statusDot" class="dot dot-warn"></div>
  <span id="statusText">初始化中</span>
  <div class="spacer"></div>
  <span id="updatedAt"></span>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTitle">输入密码</h3>
    <input type="password" id="modalPwd" placeholder="密码" autocomplete="off">
    <div class="err-msg" id="modalErr"></div>
    <div class="btn-row">
      <button class="btn-ghost" id="modalCancel">取消</button>
      <button class="btn-accent" id="modalOk">解锁</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
/* ═══ 配置：填入你的 Supabase 项目 URL 和 anon key ═══ */
const SUPABASE_URL = '__SUPABASE_URL__';
const SUPABASE_KEY = '__SUPABASE_KEY__';
const NOTE_ID      = 'default';
const useLocal = SUPABASE_URL.includes('__');

const $ = id => document.getElementById(id);
const editor    = $('editor');
const btnLock   = $('btnLock');
const btnSave   = $('btnSave');
const statePill = $('statePill');
const statusDot = $('statusDot');
const statusTxt = $('statusText');
const updatedAt = $('updatedAt');
const overlay   = $('overlay');
const modalPwd  = $('modalPwd');
const modalErr  = $('modalErr');
const STORAGE_KEY = 'cc_pwd';

let db, cipherText = '', cachedPwd = localStorage.getItem(STORAGE_KEY) || '', dirty = false;

function toast(msg, ms=2500){ const el=$('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),ms); }
function setState(s){ statePill.className='status-pill pill-'+s; statePill.textContent=s==='locked'?'已锁定':s==='unlocked'?'已解锁':'加载中'; }
function setStatus(t,ok){ statusTxt.textContent=t; statusDot.className='dot '+(ok===true?'dot-ok':ok===false?'dot-err':'dot-warn'); }
function setTime(ts){ if(!ts){updatedAt.textContent='';return;} updatedAt.textContent='更新于 '+new Date(ts).toLocaleString('zh-CN'); }

function applyLock(locked){
  editor.disabled=locked; btnLock.disabled=false;
  btnLock.textContent=locked?'🔒':'🔓';
  btnLock.title=locked?'解锁':'锁定';
  if(locked){ editor.value=''; editor.placeholder='已锁定 — 点击 🔒 输入密码解锁'; setState('locked'); setStatus('内容已锁定',null); }
  else{ editor.placeholder='在此输入或粘贴内容…'; setState('unlocked'); setStatus('可编辑',true); }
}

let modalResolve;
function openModal(title,okLabel){
  $('modalTitle').textContent=title||'输入密码';
  $('modalOk').textContent=okLabel||'解锁';
  modalPwd.value=''; modalErr.textContent='';
  overlay.classList.add('open');
  setTimeout(()=>modalPwd.focus(),100);
  return new Promise(r=>{modalResolve=r;});
}
function closeModal(val){ overlay.classList.remove('open'); if(modalResolve)modalResolve(val); }
$('modalOk').onclick=()=>closeModal(modalPwd.value.trim());
$('modalCancel').onclick=()=>closeModal(null);
modalPwd.onkeydown=e=>{if(e.key==='Enter')$('modalOk').click();};

async function deriveKey(pwd,salt){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pwd),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function encrypt(plain,pwd){
  const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12)),key=await deriveKey(pwd,salt);
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(plain));
  const buf=new Uint8Array(28+ct.byteLength);buf.set(salt,0);buf.set(iv,16);buf.set(new Uint8Array(ct),28);
  return btoa(String.fromCharCode(...buf));
}
async function decrypt(b64,pwd){
  const raw=Uint8Array.from(atob(b64),c=>c.charCodeAt(0)),key=await deriveKey(pwd,raw.slice(0,16));
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:raw.slice(16,28)},key,raw.slice(28));
  return new TextDecoder().decode(pt);
}

async function loadFromDB(){
  if(useLocal){const raw=localStorage.getItem('cc_note');return raw?JSON.parse(raw):null;}
  const {data,error}=await db.from('notes').select('cipher,updated_at').eq('id',NOTE_ID).maybeSingle();
  if(error)throw error; return data;
}
async function saveToDB(cipher){
  if(useLocal){localStorage.setItem('cc_note',JSON.stringify({cipher,updated_at:new Date().toISOString()}));return;}
  const {error}=await db.from('notes').upsert({id:NOTE_ID,cipher,updated_at:new Date().toISOString()});
  if(error)throw error;
}
async function tryUnlock(pwd){
  if(!cipherText){applyLock(false);return true;}
  try{editor.value=await decrypt(cipherText,pwd);cachedPwd=pwd;localStorage.setItem(STORAGE_KEY,pwd);applyLock(false);return true;}
  catch{return false;}
}

btnLock.onclick=async()=>{
  if(!editor.disabled){cachedPwd='';localStorage.removeItem(STORAGE_KEY);editor.value='';dirty=false;applyLock(true);toast('已锁定');return;}
  const pwd=await openModal('输入密码解锁','解锁');
  if(!pwd)return;
  if(await tryUnlock(pwd))toast('解锁成功');
  else{modalErr.textContent='密码错误';toast('密码错误');}
};


const btnClear = $('btnClear');
btnClear.onclick=async()=>{
  const ok=await openModal('确认清除所有本地数据？','清除');
  if(!ok)return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem('cc_note');
  cachedPwd=''; cipherText=''; editor.value=''; dirty=false;
  applyLock(true);
  toast('本地数据已全部清除');
};

async function doSave(){
  let pwd=cachedPwd;
  if(!pwd){pwd=await openModal('设置加密密码','保存');if(!pwd){setStatus('需要密码才能保存',false);return;}}
  const plain=editor.value;
  if(!plain.trim())return;
  try{
    setStatus('保存中…',null);
    const cipher=await encrypt(plain,pwd);
    await saveToDB(cipher);
    cipherText=cipher;cachedPwd=pwd;localStorage.setItem(STORAGE_KEY,pwd);dirty=false;
    setStatus('已自动保存',true);setTime(new Date().toISOString());
  }catch(e){setStatus('保存失败',false);}
}

let saveTimer=null;
editor.oninput=()=>{
  dirty=true;
  if(saveTimer)clearTimeout(saveTimer);
  if(editor.disabled)return;
  setStatus('等待保存…',null);
  saveTimer=setTimeout(doSave, 1500);
};
document.onkeydown=e=>{if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();doSave();}};

(async()=>{
  if(useLocal){setStatus('本地模式 (localStorage)',true);}
  else{db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);}
  try{
    setStatus('正在连接…',null);
    const row=await loadFromDB();
    if(row){
      cipherText=row.cipher;setTime(row.updated_at);
      if(cachedPwd){if(await tryUnlock(cachedPwd))setStatus('已自动解锁',true);else{cachedPwd='';localStorage.removeItem(STORAGE_KEY);applyLock(true);}}
      else applyLock(true);
    }else{cipherText='';applyLock(false);setStatus('新笔记',true);}
  }catch(e){setStatus('连接失败: '+e.message,false);applyLock(true);}
})();
</script>
</body>
</html>
